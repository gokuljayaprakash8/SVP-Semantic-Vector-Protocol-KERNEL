name: SVP Kernel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install SVP Kernel Package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run Integrity Check
      run: |
        python -c "from svp_kernel import SVP; print('SVP Kernel imported successfully! CI Pipeline Green.')"
        
