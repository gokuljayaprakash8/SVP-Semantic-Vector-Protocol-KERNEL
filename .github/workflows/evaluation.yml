name: SVP Evaluation

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests scikit-learn

      - run: python evaluation/run_eval.py
  
