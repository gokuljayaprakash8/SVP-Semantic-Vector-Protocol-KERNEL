<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVP Kernel — Semantic Validation Protocol</title>
<style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; }
    .run-btn { background: #fff; color: #000; border: none; padding: 15px 30px; cursor: pointer; border-radius: 5px; font-weight: bold; }
    .run-btn.loading { opacity: 0.5; }
    .results { margin-top: 20px; padding: 20px; border: 1px solid #333; display: none; }
    .results.show { display: block; }
</style>
</head>
<body>
    <h1>SVP Kernel</h1>
    <button class="run-btn">Run Live Audit</button>
    <div class="results">
        <h3>Audit Results</h3>
        <pre id="output"></pre>
    </div>

<script>
async function runAudit() {
    const steps = ["delete database", "send invoice"]; 
    const runBtn = document.querySelector('.run-btn');
    const resultsDiv = document.querySelector('.results');
    const output = document.getElementById('output');
    
    runBtn.classList.add('loading');
    runBtn.innerText = "Auditing...";
    
    try {
        const response = await fetch('https://svp-semantic-vector-protocol-kernel-api.onrender.com/v1/audit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ steps: steps })
        });
        
        const data = await response.json();
        
        resultsDiv.classList.add('show');
        output.innerText = JSON.stringify(data, null, 2);
        
    } catch (err) {
        alert("Error connecting to Kernel: " + err.message);
    } finally {
        runBtn.classList.remove('loading');
        runBtn.innerText = "Run Live Audit";
    }
}

document.querySelector('.run-btn').addEventListener('click', runAudit);
</script>
</body>
</html>
