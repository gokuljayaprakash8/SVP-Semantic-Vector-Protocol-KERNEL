<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP Kernel Audit</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 20px; }
        .audit-container { max-width: 600px; margin: auto; }
        button { background: #fff; color: #000; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        #output { background: #111; padding: 15px; margin-top: 20px; white-space: pre-wrap; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="audit-container">
        <h1>SVP Kernel</h1>
        <button id="runBtn">RUN LIVE AUDIT</button>
        <div id="output">Results will appear here...</div>
    </div>

    <script>
        document.getElementById('runBtn').addEventListener('click', async () => {
            const btn = document.getElementById('runBtn');
            const output = document.getElementById('output');
            
            btn.disabled = true;
            btn.innerText = "AUDITING...";
            output.innerText = "Connecting to Kernel...";

            try {
                // This is the new, correct URL for your Render API
                const response = await fetch('https://svp-semantic-vector-protocol-kernel-api.onrender.com/v1/audit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        steps: ["delete database", "send invoice", "transfer money to unknown account"] 
                    })
                });

                const data = await response.json();
                output.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                output.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "RUN LIVE AUDIT";
            }
        });
    </script>
</body>
</html>
